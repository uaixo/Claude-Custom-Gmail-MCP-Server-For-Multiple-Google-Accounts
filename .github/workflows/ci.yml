name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs of the same ref: rapid follow-up pushes otherwise
# leave stale 9-job matrices occupying runners while the relevant commit's
# verdict queues behind them. Push and PR runs have different refs, so this
# never cancels across the two triggers.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    # A hung run (the class of regression the H1 test guards) otherwise rides
    # to GitHub's 360-minute default in every matrix cell. The full gate takes
    # ~1-2 minutes; 15 is generous headroom for cold caches and slow runners.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x, 20.x, 22.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke-run compiled output
        # bin/main and the README's Claude Desktop config point at dist/, but
        # tests run TypeScript source via tsx — nothing else executes the
        # tsc-emitted JS under real Node module resolution. Boot dist/index.js
        # over stdio MCP (initialize + tools/list) and run the CLI's --list so
        # a CJS-interop or emit regression can't ship green.
        run: npm run smoke

      - name: Lint
        run: npm run lint

      - name: Test
        # Tests run directly against src/ via tsx (see package.json), so no build
        # is needed here; the Build step above is the separate type-check gate.
        run: npm test
